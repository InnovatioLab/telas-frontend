<app-card-centered type="formulario-pequeno">
  <ng-template pTemplate="content">
    <ng-container>
      <h5 id="titulo" class="text-center text-large-bold mt-0 pass-title">
        Password Recovery
      </h5>
    </ng-container>

    <form
      [formGroup]="form"
      class="mt-6 flex flex-column justify-content-center sm:justify-content-between"
    >
      <div class="col-12 mb-3">
        <span id="descricao" class="mb-3 label font-normal recover-description"
          >Enter your information to recover your password.</span
        >
      </div>
      <div class="col-12">
        <label htmlFor="login" id="lb-login" class="required">Email</label>
        <input
          pInputText
          type="email"
          formControlName="login"
          id="login"
          class="w-full input-form"
          placeholder="emailexample@mail.com"
          maxLength="255"
        />
        <app-error
          id="error-msg-login"
          [control]="form.get('login')"
          *ngIf="showError('login')"
        ></app-error>
      </div>

      <div
        class="flex flex-column-reverse md:flex-row md:justify-content-between mt-5 botoes"
      >
        <button
          pButton
          id="btnSecundario"
          class="w-full md:w-4 btn-outline my-2 justify-content-center"
          (click)="goBack()"
        >
          {{ ACTION_LABELS.back }}
        </button>
        <button
          id="botao-proximo"
          pButton
          class="w-full md:w-4 btn-fill my-2 justify-content-center"
          (click)="recoverPassword()"
        >
          {{ ACTION_LABELS.next }}
        </button>
      </div>
    </form>
  </ng-template>
</app-card-centered>
