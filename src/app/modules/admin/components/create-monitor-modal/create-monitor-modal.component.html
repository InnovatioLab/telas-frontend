<div class="create-monitor-modal">
  <div class="modal-header">
    <h2>Create Screen</h2>
    <button
      pButton
      pRipple
      icon="pi pi-times"
      class="p-button-rounded p-button-text p-button-secondary close-btn"
      (click)="cancel()"
    ></button>
  </div>

  <form [formGroup]="monitorForm" (ngSubmit)="submit()" class="modal-content">
    <div class="form-section p-0">
      <div class="form-section p-0">
        <h3>Address Information</h3>

        <div class="form-row">
          <div class="form-field">
            <label for="addressId" class="required">Partner address</label>
            <p-dropdown
              inputId="addressId"
              formControlName="addressId"
              [options]="addressOptions"
              optionLabel="label"
              optionValue="value"
              placeholder="Select an available partner address"
              [filter]="true"
              filterBy="label"
              [showClear]="true"
              [disabled]="loadingPartnerAddresses || addressOptions.length === 0"
              [style]="{ width: '100%' }"
            ></p-dropdown>
            <small class="help-text" *ngIf="loadingPartnerAddresses"
              >Loading available addresses...</small
            >
            <small class="help-text" *ngIf="!loadingPartnerAddresses && addressOptions.length === 0"
              >No available partner addresses right now.</small
            >
            <small class="error-message" *ngIf="getFieldError('addressId')">{{
              getFieldError("addressId")
            }}</small>
          </div>
        </div>
      </div>

      <div class="w-full">
        <div class="form-field w-full">
          <label for="locationDescription">Location Description</label>
          <textarea
            pInputTextarea
            id="locationDescription"
            formControlName="locationDescription"
            placeholder="Enter location description"
            rows="3"
          >
          </textarea>
          <small
            class="error-message"
            *ngIf="getFieldError('locationDescription')"
            >{{ getFieldError("locationDescription") }}</small
          >
        </div>

        <div class="form-field w-full" *ngIf="isDeveloper">
          <label for="smartPlug">Smart plug</label>
          <p-dropdown
            inputId="smartPlug"
            formControlName="smartPlugId"
            [options]="plugOptions"
            optionLabel="label"
            optionValue="value"
            placeholder="Nenhuma"
            [style]="{ width: '100%' }"
          ></p-dropdown>
        </div>
      </div>
    </div>

    <div class="container-buttons">
      <button
        pButton
        pRipple
        type="button"
        label="Cancel"
        id="btnSecundario"
        class="p-button-outlined"
        (click)="cancel()"
      ></button>
      <button
        pButton
        pRipple
        type="submit"
        label="Create Screen"
        [disabled]="monitorForm.invalid || loadingPartnerAddresses || addressOptions.length === 0"
      ></button>
    </div>
  </form>
</div>
