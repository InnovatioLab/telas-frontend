<div class="content application-logs">
  <p-card styleClass="card-header">
    <div class="card-header-content">
      <div class="p-card-content filters-toolbar">
        <div class="filters-grid">
          <div class="field">
            <label for="src" class="filter-label">Source</label>
            <p-dropdown
              inputId="src"
              [options]="sourceOptions"
              [(ngModel)]="filterSource"
              optionLabel="label"
              optionValue="value"
              placeholder="All sources"
              styleClass="w-full"
              appendTo="body"
              [overlayOptions]="{ appendTo: 'body' }"
            ></p-dropdown>
          </div>
          <div class="field">
            <label for="lvl" class="filter-label">Level</label>
            <p-dropdown
              inputId="lvl"
              [options]="levelOptions"
              [(ngModel)]="filterLevel"
              optionLabel="label"
              optionValue="value"
              placeholder="All levels"
              styleClass="w-full"
              appendTo="body"
              [overlayOptions]="{ appendTo: 'body' }"
            ></p-dropdown>
          </div>
          <div class="field field-search">
            <label for="q" class="filter-label">Message</label>
            <span class="p-input-icon-left w-full block">
              <app-icon-search
                class="search-icon search-icon-color"
                aria-hidden="true"
              ></app-icon-search>
              <input
                id="q"
                type="text"
                pInputText
                [(ngModel)]="filterQ"
                placeholder="Search message or metadata"
                class="w-full"
              />
            </span>
          </div>
          <div class="field">
            <label for="from" class="filter-label">From</label>
            <input
              id="from"
              type="text"
              pInputText
              [(ngModel)]="filterFrom"
              placeholder="ISO-8601"
              class="w-full"
            />
          </div>
          <div class="field">
            <label for="to" class="filter-label">To</label>
            <input
              id="to"
              type="text"
              pInputText
              [(ngModel)]="filterTo"
              placeholder="ISO-8601"
              class="w-full"
            />
          </div>
          <div class="field field-apply">
            <span class="filter-label filter-label--spacer" aria-hidden="true"></span>
            <button
              pButton
              type="button"
              class="btn-apply-filters"
              label="Apply filters"
              icon="pi pi-filter"
              (click)="applyFilters()"
            ></button>
          </div>
        </div>
      </div>
    </div>
  </p-card>

  <p-table
    [value]="logs"
    [loading]="loading"
    styleClass="p-datatable-sm"
    [paginator]="true"
    [rows]="rows"
    [totalRecords]="totalRecords"
    [lazy]="true"
    [rowsPerPageOptions]="[10, 20, 50, 100]"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
    paginatorDropdownAppendTo="body"
    (onLazyLoad)="onLazyLoad($event)"
    [first]="first"
    responsiveLayout="scroll"
  >
    <ng-template pTemplate="header">
      <tr>
        <th scope="col">When</th>
        <th scope="col" class="level-col">Level</th>
        <th scope="col">Source</th>
        <th scope="col">Detail</th>
        <th scope="col">Message</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td class="whitespace-nowrap">{{ row.createdAt | date : "short" }}</td>
        <td class="level-cell">
          <span class="level-badge-wrap">
            <p-badge
              [value]="row.level"
              [severity]="levelSeverity(row.level)"
            ></p-badge>
          </span>
        </td>
        <td>{{ row.source }}</td>
        <td class="metadata-cell">{{ detailFromMetadata(row) }}</td>
        <td class="message-cell">
          <div class="message-cell-inner">
            <span class="message-preview">{{ row.message }}</span>
            <button
              pButton
              type="button"
              icon="pi pi-eye"
              class="p-button-text p-button-rounded p-button-sm message-expand-btn"
              (click)="openMessageDialog(row)"
              [attr.aria-label]="'View full message'"
            ></button>
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="text-center p-4">No log entries.</td>
      </tr>
    </ng-template>
  </p-table>

  <p-dialog
    header="Message"
    [(visible)]="messageDialogVisible"
    [modal]="true"
    [style]="{ width: 'min(90vw, 48rem)' }"
    [breakpoints]="{ '960px': '95vw' }"
    [dismissableMask]="true"
    (onHide)="selectedMessage = ''"
  >
    <pre class="full-message-body">{{ selectedMessage }}</pre>
  </p-dialog>
</div>
