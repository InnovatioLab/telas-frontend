<div class="edit-monitor-modal">
  <div class="modal-header">
    <h2>Edit Screen</h2>
    <button
      pButton
      pRipple
      icon="pi pi-times"
      class="p-button-rounded p-button-text p-button-secondary close-btn"
      (click)="cancel()"
    ></button>
  </div>

  <form [formGroup]="monitorForm" (ngSubmit)="submit()" class="modal-content">
    <div class="form-section">
      <h3>Address Information</h3>

      <div class="form-row">
        <div class="form-field">
          <label for="addressId" class="required">Partner address</label>
          <p-dropdown
            inputId="addressId"
            formControlName="addressId"
            [options]="addressOptions"
            optionLabel="label"
            optionValue="value"
            placeholder="Select a partner address"
            [filter]="true"
            filterBy="label"
            [showClear]="false"
            [disabled]="loadingPartnerAddresses || addressOptions.length === 0"
            [style]="{ width: '100%' }"
          ></p-dropdown>
          <small class="help-text" *ngIf="loadingPartnerAddresses"
            >Loading available addresses...</small
          >
          <small class="error-message" *ngIf="getFieldError('addressId')">{{
            getFieldError("addressId")
          }}</small>
        </div>
      </div>

      <div formGroupName="addressPreview" class="address-group">
        <div class="form-row">
          <div class="form-field">
            <label for="zipCodePreview">Zip Code</label>
            <input type="text" pInputText id="zipCodePreview" formControlName="zipCode" />
          </div>
          <div class="form-field">
            <label for="streetPreview">Street</label>
            <input pInputText id="streetPreview" formControlName="street" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="cityPreview">City</label>
            <input pInputText id="cityPreview" formControlName="city" />
          </div>
          <div class="form-field">
            <label for="statePreview">State</label>
            <input pInputText id="statePreview" formControlName="state" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="countryPreview">Country</label>
            <input pInputText id="countryPreview" formControlName="country" />
          </div>
          <div class="form-field">
            <label for="address2Preview">Address 2</label>
            <input pInputText id="address2Preview" formControlName="address2" />
          </div>
        </div>
      </div>
    </div>

    <div class="form-section">
      <h3>Screen Information</h3>

      <div class="grid form-group">
        <div class="form-field col-3">
          <label for="active">Status</label>
          <div
            class="status-toggle-row"
            style="display: flex; align-items: center"
          >
            <p-inputSwitch id="active" formControlName="active">
            </p-inputSwitch>
            <span
              class="status-label"
              style="margin-left: 1rem; font-weight: bold"
              [ngStyle]="{
                color: monitorForm.get('active')?.value ? '#388e3c' : '#d32f2f',
              }"
            >
              {{ monitorForm.get("active")?.value ? "Active" : "Inactive" }}
            </span>
          </div>
          <small class="error-message" *ngIf="getFieldError('active')">{{
            getFieldError("active")
          }}</small>
        </div>

        <div class="form-field col-9">
          <label for="locationDescription">Location Description</label>
          <textarea
            pInputTextarea
            id="locationDescription"
            formControlName="locationDescription"
            placeholder="Enter location description"
            rows="3"
          >
          </textarea>
          <small
            class="error-message"
            *ngIf="getFieldError('locationDescription')"
            >{{ getFieldError("locationDescription") }}</small
          >
        </div>

        <div class="form-field col-12" *ngIf="isDeveloper">
          <label for="smartPlugEdit">Smart plug</label>
          <p-dropdown
            inputId="smartPlugEdit"
            formControlName="smartPlugId"
            [options]="plugOptions"
            optionLabel="label"
            optionValue="value"
            placeholder="Nenhuma"
            [style]="{ width: '100%' }"
          ></p-dropdown>
        </div>
      </div>
    </div>

    <div class="container-buttons">
      <button
        pButton
        pRipple
        type="button"
        id="btnSecundario"
        label="Cancel"
        class="p-button-outlined"
        (click)="cancel()"
      ></button>
      <button
        pButton
        pRipple
        type="submit"
        label="Update Screen"
        [disabled]="monitorForm.invalid || loadingPartnerAddresses || addressOptions.length === 0"
      ></button>
    </div>
  </form>
</div>
