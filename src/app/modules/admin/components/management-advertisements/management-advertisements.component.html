<div class="management-ads">
  <p-tabs [(value)]="activeTab" [scrollable]="true">
    <p-tablist>
      <p-tab value="requests">Client ad requests</p-tab>
      <p-tab value="approved">Ads (client-approved)</p-tab>
    </p-tablist>
    <p class="tab-hint mt-2 mb-0 text-sm text-color-secondary" style="max-width: 56rem">
      <strong>Client ad requests</strong>: incoming requests and admin workflow (API
      <code class="text-xs">clients/ads-requests</code>). <strong>Ads (client-approved)</strong>: only ads the client
      already approved — filtered with <code class="text-xs">validation=APPROVED</code> on
      <code class="text-xs">admin/ad-operations</code>.
    </p>
    <p-tabpanels>
      <p-tabpanel value="requests">
        <app-ad-request-management></app-ad-request-management>
      </p-tabpanel>
      <p-tabpanel value="approved">
        @if (activeTab === "approved") {
          <app-ads-management></app-ads-management>
        }
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</div>
