<div class="monitor-modal">
  <div class="modal-header">
    <h2>{{ mode === "edit" ? "Edit Monitor" : "Create New Monitor" }}</h2>
    <button
      pButton
      pRipple
      icon="pi pi-times"
      class="p-button-rounded p-button-text p-button-secondary close-btn"
      (click)="cancel()"
    ></button>
  </div>

  <form [formGroup]="monitorForm" (ngSubmit)="submit()" class="modal-content">
    <div class="form-section">
      <h3>Monitor Information</h3>
      <div class="form-row">
        <div class="form-field" *ngIf="mode === 'edit'">
          <label for="active">Status</label>
          <div
            class="status-toggle-row"
            style="display: flex; align-items: center"
          >
            <p-inputSwitch id="active" formControlName="active">
            </p-inputSwitch>
            <span
              class="status-label"
              style="margin-left: 1rem; font-weight: bold"
              [ngStyle]="{
                color: monitorForm.get('active')?.value ? '#388e3c' : '#d32f2f',
              }"
            >
              {{ monitorForm.get("active")?.value ? "Active" : "Inactive" }}
            </span>
          </div>
          <small class="error-message" *ngIf="getFieldError('active')">{{
            getFieldError("active")
          }}</small>
        </div>
        <div class="form-field">
          <label for="locationDescription">Location Description</label>
          <textarea
            pInputTextarea
            id="locationDescription"
            formControlName="locationDescription"
            placeholder="Enter location description"
            rows="3"
            class="standard-textarea"
          >
          </textarea>
          <small
            class="error-message"
            *ngIf="getFieldError('locationDescription')"
            >{{ getFieldError("locationDescription") }}</small
          >
        </div>
      </div>
    </div>

    <div class="form-section">
      <h3>Address Information</h3>
      <div class="form-row">
        <div class="form-field">
          <label for="addressId" class="required">Address ID</label>
          <input pInputText id="addressId" formControlName="addressId" />
          <small class="error-message" *ngIf="getFieldError('addressId')">{{
            getFieldError("addressId")
          }}</small>
        </div>
      </div>
    </div>

    <div class="form-actions action-buttons">
      <button
        pButton
        pRipple
        type="button"
        label="Cancel"
        class="p-button-outlined"
        (click)="cancel()"
      ></button>
      <button
        pButton
        pRipple
        type="submit"
        [label]="mode === 'edit' ? 'Update Monitor' : 'Create Monitor'"
        [disabled]="monitorForm.invalid"
      ></button>
    </div>
  </form>
</div>
