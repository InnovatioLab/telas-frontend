<div class="client-messages-history">
  <p-card styleClass="card-header">
    <div class="page-header flex justify-content-between align-items-center w-full">
      <div>
        <h3 class="page-title m-0">Histórico de mensagens</h3>
        <small class="page-subtitle">
          {{ clientName || clientId }}
          <span *ngIf="clientEmail">• {{ clientEmail }}</span>
        </small>
      </div>
      <a
        pButton
        class="p-button-text back-link"
        [routerLink]="['/admin/clients']"
        icon="pi pi-arrow-left"
        label="Voltar"
      ></a>
    </div>
  </p-card>

  <div class="messages-content w-full mt-3">
    <p-progressSpinner *ngIf="loading"></p-progressSpinner>

    <div *ngIf="!loading && grouped.length === 0" class="empty-state">
      Nenhuma mensagem encontrada.
    </div>

    <p-accordion
      *ngIf="!loading && grouped.length > 0"
      [multiple]="true"
      styleClass="messages-accordion"
    >
      <p-accordionpanel *ngFor="let g of grouped; let i = index" [value]="i">
        <p-accordionheader>{{ g.adName }}</p-accordionheader>
        <p-accordioncontent>
          <div class="flex flex-column gap-2">
            <div *ngFor="let m of g.rows" class="message-item">
              <div class="message-meta">
                {{ m.senderName || m.senderRole }} • {{ m.createdAt | date }}
              </div>
              <div class="message-body">{{ m.message }}</div>
            </div>
          </div>
        </p-accordioncontent>
      </p-accordionpanel>
    </p-accordion>
  </div>
</div>
