<p-card class="wishlist-item-card">
  <div class="item-content" [class.no-photo]="!item.photoUrl">
    <div class="item-photo" *ngIf="item.photoUrl">
      <img
        [src]="item.photoUrl"
        [alt]="item.addressLocationName || 'Address image'"
        class="monitor-image"
      />
    </div>

    <div class="item-info">
      <div class="info-group" *ngIf="item.addressLocationName">
        <h3 class="item-name">{{ item.addressLocationName }}</h3>
      </div>

      <div
        class="info-group"
        *ngIf="!item.addressLocationName"
      >
        <p><strong>Address: </strong>{{ item.fullAddress }}</p>
      </div>

      <div class="info-details">
        <div class="detail-item">
          <span class="detail-label">Available:</span>
          <span
            class="detail-value"
            [class.unavailable]="!item.hasAvailableSlots"
          >
            {{ item.hasAvailableSlots ? "Yes" : "No" }}
          </span>
        </div>
      </div>

      <div class="item-actions">
        <button
          pButton
          label="Add Screen"
          icon="pi pi-plus"
          class="p-button p-button-primary"
          [disabled]="isButtonDisabled"
          (click)="onAddToCart()"
        ></button>
      </div>
    </div>
  </div>
</p-card>
