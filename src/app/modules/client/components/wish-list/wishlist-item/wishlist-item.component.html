<p-card class="wishlist-item-card">
  <div class="item-content" [class.no-photo]="!resolveThumbSrc()">
    <div class="item-photo">
      <ng-container *ngIf="resolveThumbSrc() as thumbSrc; else emptyThumb">
        <img
          [src]="thumbSrc"
          [alt]="item.addressLocationName || 'Address image'"
          class="monitor-image"
          loading="lazy"
          decoding="async"
          (error)="onThumbError()"
        />
      </ng-container>
      <ng-template #emptyThumb>
        <div class="thumb-placeholder" aria-hidden="true"></div>
      </ng-template>
    </div>

    <div class="item-info">
      <div class="info-group" *ngIf="item.addressLocationName">
        <h3 class="item-name">{{ item.addressLocationName }}</h3>
      </div>

      <div
        class="info-group"
        *ngIf="!item.addressLocationName"
      >
        <p><strong>Address: </strong>{{ item.fullAddress }}</p>
      </div>

      <div class="info-details">
        <div class="detail-item">
          <span class="detail-label">Available:</span>
          <span
            class="detail-value"
            [class.unavailable]="!item.hasAvailableSlots"
          >
            {{ item.hasAvailableSlots ? "Yes" : "No" }}
          </span>
        </div>
      </div>

      <div class="item-actions" *ngIf="item.hasAvailableSlots && item.active">
        <button
          pButton
          label="Add Screen"
          icon="pi pi-plus"
          class="p-button p-button-primary"
          [disabled]="isButtonDisabled"
          (click)="onAddToCart()"
        ></button>
      </div>
    </div>
  </div>
</p-card>
