<div class="partner-screens">
  <p-card styleClass="partner-screens-header">
    <div class="header-content">
      <div>
        <h1 class="m-0">My screens</h1>
        <p class="subtitle m-0">
          Select a screen linked to your partner account and upload your ad file.
        </p>
      </div>
    </div>
  </p-card>

  <p-table
    [value]="screens"
    [loading]="loading"
    styleClass="p-datatable-sm"
    responsiveLayout="scroll"
  >
    <ng-template pTemplate="header">
      <tr>
        <th scope="col">Status</th>
        <th scope="col">Address</th>
        <th scope="col">Ads on screen</th>
        <th scope="col">Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-screen>
      <tr>
        <td>
          <p-tag
            [value]="screen.active ? 'Active' : 'Inactive'"
            [severity]="screen.active ? 'success' : 'danger'"
          ></p-tag>
        </td>
        <td>{{ screenAddress(screen) }}</td>
        <td>{{ adsLabel(screen) }}</td>
        <td>
          <button
            pButton
            type="button"
            label="Upload files"
            icon="pi pi-upload"
            class="p-button-sm"
            [disabled]="!canUpload(screen)"
            (click)="openUpload(screen)"
          ></button>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4" class="text-center">
          No screens are linked to your partner account yet.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
