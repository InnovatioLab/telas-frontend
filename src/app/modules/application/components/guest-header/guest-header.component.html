<header class="guest-header">

  @let theme = (toggleMode.theme$ | async) ?? "light";

  <div class="guest-header-bar">

    <div class="guest-header-main">

      <div class="guest-header-row">

        <div class="logo-container">

          <img

            [src]="toggleMode.logoSrc(theme)"

            alt="Logo"

            class="header-logo"

          />

        </div>



        <nav

          class="flex align-items-center justify-content-center gap-2 md:gap-3 lg:gap-6 text-center nav-container"

        >

          @for (link of navLinks; track $index) {

            <a

              href="{{ link.section }}"

              class="text-gray-dark nav-link cursor-pointer hover:underline"

            >

              {{ link.label }}

            </a>

          }

        </nav>

        <div class="flex align-items-center gap-3 header-actions">

          <div class="login-dropdown-wrap">
            <button
              type="button"
              class="btn btn-outline guest-header-btn-outline"
              (click)="toggleLoginMenu($event)"
            >
              <app-icon-logout width="18" height="18" class="icon mr-2"></app-icon-logout>
              <span class="guest-header-btn-label">Login</span>
              <i class="pi pi-angle-down login-dropdown-chevron" aria-hidden="true"></i>
            </button>
            <p-menu
              #loginMenu
              [model]="loginMenuItems"
              [popup]="true"
              appendTo="body"
              styleClass="guest-login-menu"
            ></p-menu>
          </div>

          <button type="button" class="btn btn-primary" (click)="onRegister()">

            <app-icon-user width="18" height="18" class="icon mr-2"></app-icon-user>

            Sign Up

          </button>

        </div>

      </div>

    </div>

    <div class="guest-header-theme-edge">

      <ui-toggle />

    </div>

  </div>

</header>
