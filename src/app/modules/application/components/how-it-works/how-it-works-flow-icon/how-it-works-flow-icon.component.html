<div
  class="how-step-flow-icon"
  [class.how-step-flow-icon--outline]="isOutlineIcon()"
  [class.how-step-flow-icon--check]="icon === 'check'"
  [class.how-step-flow-icon--check-success]="icon === 'check-success'"
  [class.how-step-flow-icon--placeholder]="!icon"
>
  @switch (icon) {
    @case ('upload') {
      <span class="how-step-flow-icon-svg how-step-flow-icon-svg--outline">
        <i class="pi pi-cloud-upload" aria-hidden="true"></i>
      </span>
    }
    @case ('clipboard') {
      <span class="how-step-flow-icon-svg how-step-flow-icon-svg--outline">
        <app-icon-clipboard-list />
      </span>
    }
    @case ('send') {
      <span class="how-step-flow-icon-svg how-step-flow-icon-svg--outline">
        <i class="pi pi-send" aria-hidden="true"></i>
      </span>
    }
    @case ('eye') {
      <span class="how-step-flow-icon-svg how-step-flow-icon-svg--outline">
        <app-icon-eye-outline />
      </span>
    }
    @case ('check') {
      <span class="how-step-flow-icon-svg how-step-flow-icon-svg--check">
        <app-icon-check-stroke />
      </span>
    }
    @case ('check-success') {
      <span class="how-step-flow-icon-svg how-step-flow-icon-svg--check">
        <app-icon-check-stroke />
      </span>
    }
    @default {
      <span class="how-step-flow-icon-slot"></span>
    }
  }
</div>
